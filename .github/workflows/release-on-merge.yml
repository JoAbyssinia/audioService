name: Release on Merge

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Changed from 'read' to 'write' for creating releases
      packages: write

    steps:
      - name:  Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed to fetch all tags for version calculation

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Read and increment version
        id: get_version
        run: |
          current=$(cat version.txt)
          echo "Current version: $current"
          IFS='.' read -r major minor patch <<< "$current"

          # Check commit message for version bump instructions
          commit_msg="${{ github.event.head_commit.message }}"
          if [[ "$commit_msg" =~ \[major\] ]]; then
            new_version="$((major+1)).0.0"
            echo "🚀 Major version bump detected: $current -> $new_version"
          elif [[ "$commit_msg" =~ \[minor\] ]]; then
            new_version="$major.$((minor+1)).0"
            echo "✨ Minor version bump detected: $current -> $new_version"
          elif [[ "$commit_msg" =~ \[patch\] ]]; then
            new_version="$major.$minor.$((patch+1))"
            echo "🔧 Patch version bump detected: $current -> $new_version"
          else
            new_version="$current"
            echo "ℹ️  No version bump tag found - using current version: $new_version"
          fi

          echo "new_version=v$new_version" >> $GITHUB_ENV
          echo "version_number=$new_version" >> $GITHUB_ENV
          echo "version_changed=$([[ "$new_version" != "$current" ]] && echo "true" || echo "false")" >> $GITHUB_ENV

      - name: Update version.txt if changed
        if: env.version_changed == 'true'
        run: |
          echo "${{ env.version_number }}" > version.txt
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add version.txt
          git commit -m "chore: bump version to ${{ env.version_number }} [skip ci]"
          git push

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Run Test
        run:  mvn test

      - name:  run spotless test
        run:  mvn spotless:check

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:  ${{ env.new_version }}
          body: "Automatic release for new changes merged into main..."
          draft: false
          prerelease: false
          files: |
            target/*.jar
        env:
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}  # Use built-in token

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            joabyssinia/audio-transcoder-services:${{ env.new_version }}
            joabyssinia/audio-transcoder-services:latest

